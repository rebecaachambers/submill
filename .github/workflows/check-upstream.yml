name: Check Upstream Updates

on:
  schedule:
    - cron: "0 0 1 * *"   # Monthly on the 1st
  workflow_dispatch:       # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check subs-check latest release
        id: subs
        run: |
          LATEST=$(curl -s https://api.github.com/repos/beck-8/subs-check/releases/latest | jq -r .tag_name)
          echo "subs_latest=${LATEST}" >> $GITHUB_OUTPUT
          echo "subs-check latest: $LATEST"

      - name: Check Mihomo latest version
        id: mihomo
        run: |
          LATEST=$(curl -s https://proxy.golang.org/github.com/metacubex/mihomo/@latest | jq -r .Version)
          echo "mihomo_latest=${LATEST}" >> $GITHUB_OUTPUT
          echo "mihomo latest: $LATEST"

      - name: Create notification issue
        uses: actions/github-script@v7
        with:
          script: |
            const subsLatest = "${{ steps.subs.outputs.subs_latest }}";
            const mihomoLatest = "${{ steps.mihomo.outputs.mihomo_latest }}";

            const body = [
              "## 上游更新检测 (Monthly)",
              "",
              `| 项目 | 最新版本 |`,
              `|---|---|`,
              `| [subs-check](https://github.com/beck-8/subs-check) | ${subsLatest} |`,
              `| [Mihomo](https://github.com/MetaCubeX/mihomo) | ${mihomoLatest} |`,
              "",
              "> 此 Issue 仅作通知，不会自动更新代码。需要升级时请手动操作。",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `上游更新: subs-check ${subsLatest} / Mihomo ${mihomoLatest}`,
              body: body,
              labels: ["upstream"],
            });