name: Check Upstream Updates

on:
  schedule:
    - cron: "0 0 1 * *"   # Monthly on the 1st
  workflow_dispatch:       # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check subs-check latest release
        id: subs
        run: |
          RELEASE=$(curl -s https://api.github.com/repos/beck-8/subs-check/releases/latest)
          TAG=$(echo "$RELEASE" | jq -r .tag_name)
          BODY=$(echo "$RELEASE" | jq -r .body)
          PUBLISHED=$(echo "$RELEASE" | jq -r .published_at)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "published=${PUBLISHED}" >> $GITHUB_OUTPUT

      - name: Check Mihomo latest version
        id: mihomo
        run: |
          LATEST=$(curl -s https://proxy.golang.org/github.com/metacubex/mihomo/@latest | jq -r .Version)
          echo "version=${LATEST}" >> $GITHUB_OUTPUT

      - name: Create notification issue
        uses: actions/github-script@v7
        with:
          script: |
            const subsTag = "${{ steps.subs.outputs.tag }}";
            const subsBody = `${{ steps.subs.outputs.body }}`;
            const subsPublished = "${{ steps.subs.outputs.published }}";
            const mihomoVersion = "${{ steps.mihomo.outputs.version }}";

            const body = [
              "## 上游更新检测 (Monthly)",
              "",
              "### [subs-check](https://github.com/beck-8/subs-check)",
              `**版本**: ${subsTag}`,
              `**发布日期**: ${subsPublished}`,
              "",
              "**更新内容**:",
              subsBody || "(未获取到更新说明)",
              "",
              "---",
              "",
              "### [Mihomo](https://github.com/MetaCubeX/mihomo)",
              `**版本**: ${mihomoVersion}`,
              "",
              `Changelog: https://github.com/MetaCubeX/mihomo/releases/tag/${mihomoVersion}`,
              "",
              "> 此 Issue 仅作通知，不会自动更新。需要升级时请 @rebecaachambers",
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Upstream] subs-check ${subsTag} / Mihomo ${mihomoVersion}`,
              body: body,
              labels: ["upstream"],
            });