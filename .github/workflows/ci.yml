name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Extract vendor tarballs
        run: |
          if [ ! -d vendor ] && [ -f assets/vendor.tar.gz ]; then
            tar -xzf assets/vendor.tar.gz
          fi
          if [ ! -d mihomo/vendor ] && [ -f assets/mihomo-vendor.tar.gz ]; then
            tar -xzf assets/mihomo-vendor.tar.gz
          fi

      - name: Build SubMill
        run: go build -mod=vendor -trimpath -o submill .

      - name: Build Mihomo
        working-directory: mihomo
        run: go build -mod=vendor -trimpath -o mihomo github.com/metacubex/mihomo

      - name: Run tests
        run: go test -mod=vendor -v -count=1 ./...