name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Extract vendor tarballs
        run: |
          if [ ! -d vendor ] && [ -f assets/vendor.tar.gz ]; then
            tar -xzf assets/vendor.tar.gz
          fi
          if [ ! -d mihomo/vendor ] && [ -f assets/mihomo-vendor.tar.gz ]; then
            tar -xzf assets/mihomo-vendor.tar.gz
          fi

      - name: Build SubMill (Linux)
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -mod=vendor -trimpath -ldflags="-s -w" -o build/submill-linux-amd64 .

      - name: Build Mihomo (Linux)
        working-directory: mihomo
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -mod=vendor -trimpath -ldflags="-s -w" -o ../build/mihomo-linux-amd64 github.com/metacubex/mihomo

      - name: Build SubMill (Windows)
        run: GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -mod=vendor -trimpath -ldflags="-s -w -H windowsgui" -o build/submill-windows-amd64.exe .

      - name: Build Mihomo (Windows)
        working-directory: mihomo
        run: GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -mod=vendor -trimpath -ldflags="-s -w" -o ../build/mihomo-windows-amd64.exe github.com/metacubex/mihomo

      - name: Run tests
        run: go test -mod=vendor -v -count=1 ./...

      - name: Upload artifacts (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: submill-win
          path: |
            build/submill-windows-amd64.exe
            build/mihomo-windows-amd64.exe

      - name: Upload artifacts (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: submill-linux
          path: |
            build/submill-linux-amd64
            build/mihomo-linux-amd64